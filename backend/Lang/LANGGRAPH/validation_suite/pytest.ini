# pytest configuration for Placement Compass Validation Suite

[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum pytest version
minversion = 7.0

# Test paths
testpaths = .

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --color=yes
    -ra

# Markers definition
markers =
    # Validation type markers
    valid: Tests for valid/positive inputs
    invalid: Tests for invalid/negative inputs
    format: Tests for format/pattern validation
    crossfield: Tests for cross-field validation
    temporal: Tests for temporal/date validation
    datasource: Tests for data source validation
    record_level: Tests for record-level quality
    business_rule: Tests for domain business rules
    
    # Priority markers
    critical: Critical test cases (P0)
    high: High priority test cases (P1)
    medium: Medium priority test cases (P2)
    low: Low priority test cases (P3)

# Logging
log_cli = false
log_cli_level = INFO
log_file = validation_logs.txt
log_file_level = DEBUG

# Coverage options (if pytest-cov is installed)
# addopts = --cov=validators --cov-report=html --cov-report=term

# Timeout (if pytest-timeout is installed)
# timeout = 300

# Parallel execution (if pytest-xdist is installed)
# addopts = -n auto